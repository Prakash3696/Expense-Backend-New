# Server
server.port=${PORT:8080}
spring.application.name=Fin-Track
server.address=0.0.0.0


# Database
spring.datasource.url=jdbc:mysql://fin-track-prakash-mondal.d.aivencloud.com:13246/defaultdb?ssl-mode=REQUIRED
